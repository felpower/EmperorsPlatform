<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="All-in-one football team platform for memberships, player passes, attendance, and role-based administration."
    />
    <meta name="theme-color" content="#171d1d" />
    <link rel="icon" href="./favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
    <script src="https://cdn.jsdelivr.net/npm/appwrite@17.0.0"></script>
    <script src="./src/appwrite-config.js?v=20260424"></script>
    <script src="./src/appwrite-backend-compat.js?v=20260424b"></script>
    <script src="./src/modules/cache-utils.js?v=20260424"></script>
    <script src="./src/modules/iban-utils.js?v=20260424"></script>
    <script src="./src/modules/profile-finance.js?v=20260424"></script>
    <title>Uni Wien Emperors Platform</title>
  </head>
  <body>
    <button id="menu-toggle" class="menu-toggle-button" type="button" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <img class="brand-mark" src="./assets/emperors-mark.png" alt="Uni Wien Emperors logo" />
          <div>
            <p class="eyebrow">Team Operations</p>
            <img class="brand-wordmark" src="./assets/emperors-wordmark.png" alt="Emperors wordmark" />
          </div>
        </div>

        <nav class="nav" aria-label="Primary">
          <a class="nav-link active" href="#dashboard" data-view="dashboard">Dashboard</a>
          <a class="nav-link" href="#members" data-view="members">Members</a>
          <a class="nav-link" href="#fees" data-view="fees">Membership Finance</a>
          <a class="nav-link" href="#passes" data-view="passes">Player Passes</a>
          <a class="nav-link" href="#organization" data-view="organization">Organization</a>
          <a class="nav-link" href="#equipment" data-view="equipment">Equipment</a>
          <a class="nav-link" href="#pass-sync" data-view="pass-sync">Pass Sync Review</a>
          <a class="nav-link" href="#events" data-view="events">Practices &amp; Games</a>
          <a class="nav-link" href="#invites" data-view="invites">Invites</a>
          <a class="nav-link" href="#settings" data-view="settings">Setup</a>
          <hr style="margin: 16px 0; border: none; border-top: 1px solid var(--line);" />
          <div class="button-row" style="display:flex; gap:8px;">
            <button id="profile-nav-button" class="nav-link" type="button" style="background: none; border: none; cursor: pointer; text-align: left; display: block; width: auto; flex:1;">My Profile</button>
            <button id="logout-nav-button" class="nav-link" type="button" style="background: none; border: none; cursor: pointer; text-align: left; display: none; width: auto; flex:1;">Log out</button>
          </div>
        </nav>
      </aside>

      <main class="main-content">
        <header class="hero">
          <div class="hero-actions"></div>
        </header>

        <section id="dashboard" class="view active" aria-label="Dashboard"></section>
        <section id="members" class="view" aria-label="Members"></section>
        <section id="fees" class="view" aria-label="Membership finance"></section>
        <section id="user" class="view" aria-label="User profile"></section>
        <section id="passes" class="view" aria-label="Player passes"></section>
        <section id="organization" class="view" aria-label="Organization"></section>
        <section id="equipment" class="view" aria-label="Equipment inventory"></section>
        <section id="pass-sync" class="view" aria-label="Pass sync review"></section>
        <section id="events" class="view" aria-label="Events"></section>
        <section id="invites" class="view" aria-label="Invites"></section>
        <section id="settings" class="view" aria-label="Setup"></section>
        <section id="recovery" class="view" aria-label="Set password"></section>
      </main>
    </div>

    <dialog id="member-dialog" class="dialog">
      <form method="post" id="member-form" class="dialog-form" novalidate>
        <input type="hidden" name="memberId" />

        <div class="dialog-header">
          <div>
            <p class="eyebrow">Member</p>
            <h3 id="member-dialog-title">Add a club member</h3>
          </div>
          <button class="ghost-icon" type="button" value="cancel" aria-label="Close">&times;</button>
        </div>

        <div class="form-grid">
          <label>
            First name
            <input name="firstName" />
          </label>

          <label>
            Last name
            <input name="lastName" />
          </label>
        </div>

        <div class="form-grid">
          <label>
            Email
            <input name="email" type="email" />
          </label>

          <label>
            Jersey number
            <input name="jerseyNumber" type="number" min="1" max="99" />
          </label>
        </div>

        <fieldset class="status-filter-group">
          <legend>Roles</legend>
          <div class="action-row">
            <button type="button" class="ghost-button small-button" id="roles-select-all">Select all roles</button>
            <button type="button" class="ghost-button small-button" id="roles-clear-all">Clear roles</button>
          </div>
          <div class="status-filter-options">
            <label class="status-check"><input type="checkbox" name="roles" value="player" checked /><span>Athlete</span></label>
            <label class="status-check"><input type="checkbox" name="roles" value="coach" /><span>Coach</span></label>
            <label class="status-check"><input type="checkbox" name="roles" value="admin" /><span>admin</span></label>
            <label class="status-check"><input type="checkbox" name="roles" value="finance_admin" /><span>Finance</span></label>
            <label class="status-check"><input type="checkbox" name="roles" value="tech_admin" /><span>Tech</span></label>
            <label class="status-check"><input type="checkbox" name="roles" value="staff" /><span>Staff</span></label>
          </div>
        </fieldset>

        <fieldset class="status-filter-group">
          <legend>Positions</legend>
          <div class="action-row">
            <button type="button" class="ghost-button small-button" id="positions-select-all">Select all positions</button>
            <button type="button" class="ghost-button small-button" id="positions-clear-all">Clear positions</button>
          </div>
          <div class="status-filter-options">
            <label class="status-check"><input type="checkbox" name="positions" value="QB" /><span>QB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="RB" /><span>RB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="FB" /><span>FB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="WR" /><span>WR</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="TE" /><span>TE</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="OL" /><span>OL</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="DL" /><span>DL</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="LB" /><span>LB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="DB" /><span>DB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="CB" /><span>CB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="S" /><span>S</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="K" /><span>K</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="P" /><span>P</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="OT" /><span>OT</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="OG" /><span>OG</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="C" /><span>C</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="DT" /><span>DT</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="DE" /><span>DE</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="NT" /><span>NT</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="ILB" /><span>ILB</span></label>
            <label class="status-check"><input type="checkbox" name="positions" value="OLB" /><span>OLB</span></label>
          </div>
        </fieldset>

        <label>
          Membership status
          <select name="membershipStatus">
            <option value="active">Active</option>
            <option value="pending">Pending</option>
            <option value="inactive">Inactive</option>
          </select>
        </label>

        <div class="form-grid">
          <label>
            Pass status
            <select name="passStatus" class="member-inline-pass-status">
              <option value="valid" selected>valid</option>
              <option value="missing">missing</option>
              <option value="expired">expired</option>
            </select>
          </label>

          <label>
            Pass expiry
            <input name="passExpiry" type="date" class="member-inline-pass-expiry" />
          </label>
        </div>

        <label>
          Notes
          <textarea name="notes" rows="3"></textarea>
        </label>

        <div class="dialog-actions">
          <button value="cancel" type="button" class="ghost-button">Cancel</button>
          <button value="default" type="button" class="primary-button" id="member-submit-button">Save member</button>
        </div>
      </form>
    </dialog>

    <script defer src="./app.bundle.js?v=20260424c"></script>
  </body>
</html>
